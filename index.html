<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS認音大挑戰 - 低音篇</title>
    <style>
        :root {
            --forest-green: #1B4332;
            --leaf-green: #74C69D;
            --wood-brown: #604439;
            --sand-light: #F8F4E3;
            --text-serif: "PMingLiU", "SimSun", "Times New Roman", serif;
        }

        body {
            font-family: var(--text-serif);
            background: linear-gradient(135deg, #D8F3DC 0%, #95D5B2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            color: var(--forest-green);
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 12px 0px var(--wood-brown), 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 980px;
            position: relative;
            text-align: center;
            border: 6px solid var(--sand-light);
        }

        h1#main-title {
            font-size: 2.5rem;
            margin: 10px 0;
            color: var(--forest-green);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .badge {
            background: var(--sand-light);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--wood-brown);
        }

        #canvas-wrapper {
            background: white;
            border-radius: 25px;
            border: 6px solid var(--leaf-green);
            margin: 15px auto;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 98%; 
            padding: 12px; 
            box-sizing: border-box;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        #answer-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
            min-height: 200px;
        }

        .animal-btn {
            background: #FFF;
            border: 4px solid var(--wood-brown);
            border-radius: 30px;
            padding: 15px;
            width: 160px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--wood-brown);
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--wood-brown);
        }

        .img-container {
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem; 
            margin-bottom: 5px;
        }

        .animal-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .letter-name {
            font-size: 2.8rem; 
            font-weight: bold;
            color: var(--wood-brown);
            white-space: nowrap;
        }

        /* 答對/答錯視覺效果：CSS 部分 */
        @keyframes shakeEffect {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }
        .shake-btn {
            animation: shakeEffect 0.3s ease-in-out 0s 1;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 34px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .btn-forest {
            font-family: var(--text-serif);
            background: var(--forest-green);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.4rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--wood-brown);
            font-weight: bold;
            margin: 10px;
            width: 300px;
        }

        input#playerNameInput {
            font-family: var(--text-serif);
            padding: 12px 20px;
            font-size: 1.4rem;
            border-radius: 50px;
            border: 3px solid var(--leaf-green);
            outline: none;
            text-align: center;
            width: 280px;
            margin: 15px 0;
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .rank-table th { background: var(--leaf-green); padding: 12px; color: white; }
        .rank-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }

        .tab-btn {
            font-family: var(--text-serif);
            padding: 8px 15px; border-radius: 12px; border: 2px solid var(--forest-green);
            background: white; cursor: pointer; margin: 0 2px; font-weight: bold;
        }
        .tab-btn.active { background: var(--forest-green); color: white; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 id="main-title">CMS認音大挑戰</h1>
    
    <div class="stats-bar">
        <div class="badge" id="lv-display">LV 1</div>
        <div class="badge" id="count-display">1 / 10</div>
        <div class="badge">⭐ <span id="score-val">0</span></div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="1000" height="650"></canvas>
    </div>
    
    <div id="answer-area"></div>

    <div id="overlay">
        <div id="menu-view">
            <h1 style="font-size: 3rem; margin-bottom: 20px;">CMS認音大挑戰</h1>
            <p style="color: var(--wood-brown); font-weight: bold; font-size: 1.2rem;">請選擇學習等級（低音由上而下）：</p>
            <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 700px;">
                <button class="btn-forest" onclick="startGame(1)">Level 1 (C, B, A)</button>
                <button class="btn-forest" onclick="startGame(2)">Level 2 (C - F)</button>
                <button class="btn-forest" onclick="startGame(3)">Level 3 (C - D)</button>
                <button class="btn-forest" onclick="startGame(4)">Level 4 (C - B, 低音)</button>
                <button class="btn-forest" onclick="startGame(5)">Level 5 (C - 低音E)</button>
            </div>
            <button class="btn-forest" style="background: var(--wood-brown); margin-top: 30px; width: 220px;" onclick="showRank()">🏆 高手排行榜</button>
        </div>

        <div id="result-view" style="display: none;">
            <h2 id="result-title" style="font-size: 3.5rem; color: var(--forest-green); margin-bottom: 10px;">太利害啦！</h2>
            <p id="result-text" style="font-size: 1.8rem; margin: 5px 0;"></p>
            <p id="time-text" style="color: var(--wood-brown); font-weight: bold; font-size: 1.3rem;"></p>
            <input type="text" id="playerNameInput" placeholder="你的名字..." maxlength="10">
            <button class="btn-forest" onclick="submitAndRestart()">記錄並再玩一次</button>
            <button class="btn-forest" style="background: var(--leaf-green); color: var(--forest-green);" onclick="submitAndGoHome()">記錄並回首頁</button>
        </div>

        <div id="rank-view" style="display: none; width: 95%;">
            <h1 style="font-size: 2rem;">高手排行榜</h1>
            <div id="rank-body-container" style="max-height: 350px; overflow-y: auto; background: white; border-radius: 15px; width: 100%; margin: 10px 0;">
                <table class="rank-table">
                    <thead><tr><th>排名</th><th>名稱</th><th>LV</th><th>分數</th><th>耗時</th><th>日期</th></tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
            <button class="btn-forest" style="width: 200px;" onclick="goHome()">回首頁</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let curLv = 1;
    let score = 0;
    let targetNote = "";
    let lastTargetNote = "";
    let questionsLeft = 10;
    let startTime, endTime;
    let isAnswering = false; /* 答對/答錯視覺效果：防止連點開關 */

    const s = 91; 

    const canvasCenterY = canvas.height / 2; 
    const baseLine3Y = canvasCenterY;        
    const baseBottomY = baseLine3Y + 2 * s;  

    const notesMap = {
        1: ["C4", "B3", "A3"],
        2: ["C4", "B3", "A3", "G3", "F3"],
        3: ["C4", "B3", "A3", "G3", "F3", "E3", "D3"],
        4: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2"],
        5: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2", "A2", "G2", "F2", "E2"]
    };

    const animalConfig = {
        'C': { img: 'images/cat-h.PNG', emoji: '🐱' },
        'B': { img: 'images/bear-h.PNG', emoji: '🐻' },
        'A': { img: 'images/ape-h.PNG', emoji: '🦧' },
        'G': { img: 'images/giraffe-h.PNG', emoji: '🦒' },
        'F': { img: 'images/frog-h.PNG', emoji: '🐸' },
        'E': { img: 'images/elephant-h.PNG', emoji: '🐘' },
        'D': { img: 'images/dog-h.PNG', emoji: '🐶' }
    };

    const stepData = {
        "C4": 10, "B3": 9, "A3": 8, "G3": 7, "F3": 6, "E3": 5, "D3": 4, "C3": 3, "B2": 2, "A2": 1, "G2": 0, "F2": -1, "E2": -2
    };

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 5;
        
        for (let i = 0; i < curLv; i++) {
            let y = baseBottomY - (i * s);
            ctx.beginPath(); 
            ctx.moveTo(100, y); 
            ctx.lineTo(900, y); 
            ctx.stroke();
        }

        const clefLine4Y = baseBottomY - s;
        ctx.fillStyle = "#111"; 
        ctx.font = `${s * 7.5}px serif`; 
        /* 低音譜號下移80px */
        ctx.fillText("𝄢", 110, clefLine4Y + 35 + 80); 

        if (targetNote) {
            const steps = stepData[targetNote]; 
            const y = baseBottomY - (steps * (s / 2));
            /* 音符右移40px */
            const x = (canvas.width / 2 + 50) + 40; 

            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.ellipse(x, y, s * 0.666, s * 0.477, -Math.PI / 8, 0, 2 * Math.PI);
            ctx.fill();

            if (steps >= 10 || steps <= -2) {
                ctx.beginPath(); 
                ctx.moveTo(x - s, y); 
                ctx.lineTo(x + s, y); 
                ctx.stroke();
            }
        }
    }

    function startGame(lv) {
        curLv = lv;
        score = 0; questionsLeft = 10;
        startTime = new Date();
        document.getElementById('score-val').innerText = "0";
        document.getElementById('lv-display').innerText = `LV ${curLv}`;
        document.getElementById('overlay').style.display = 'none';
        nextQuestion();
    }

    function nextQuestion() {
        isAnswering = false; /* 答對/答錯視覺效果：重置答題狀態 */
        const pool = notesMap[curLv];
        let nextNote;
        do {
            nextNote = pool[Math.floor(Math.random() * pool.length)];
        } while (nextNote === lastTargetNote && pool.length > 1);
        
        targetNote = nextNote;
        lastTargetNote = nextNote;
        document.getElementById('count-display').innerText = `${11 - questionsLeft} / 10`;
        drawScene();
        generateChoices(targetNote.charAt(0));
    }

    /* 答對/答錯視覺效果：輔助函數 */
    function showCorrectEffect(btn, letterSpan, letter) {
        btn.style.background = "#90EE90";
        letterSpan.innerText = "✔️ " + letter;
    }

    function showWrongEffect(btn, letterSpan, letter) {
        btn.style.background = "#FFB3B3";
        btn.classList.add('shake-btn');
        letterSpan.innerText = "❌ " + letter;
        setTimeout(() => btn.classList.remove('shake-btn'), 300);
    }

    function generateChoices(correctLetter) {
        const allLetters = ['C', 'B', 'A', 'G', 'F', 'E', 'D'];
        let choices = [correctLetter];
        let others = allLetters.filter(l => l !== correctLetter).sort(() => Math.random() - 0.5);
        while (choices.length < 3) choices.push(others.pop());
        choices.sort(() => Math.random() - 0.5);

        const area = document.getElementById('answer-area');
        area.innerHTML = '';
        choices.forEach(letter => {
            const config = animalConfig[letter];
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            
            // 建立獨立的 letterDiv 元素（顯示字母及臨時符號）
            const letterDiv = document.createElement('div');
            letterDiv.className = 'letter-name';
            letterDiv.innerText = letter;

            btn.onclick = () => {
                /* 答對/答錯視覺效果：判斷邏輯 */
                if (isAnswering) return;
                isAnswering = true;

                if (letter === targetNote.charAt(0)) {
                    score++;
                    document.getElementById('score-val').innerText = score;
                    showCorrectEffect(btn, letterDiv, letter);
                } else {
                    showWrongEffect(btn, letterDiv, letter);
                }

                // 延遲 0.4 秒後恢復並進入下一題
                setTimeout(() => {
                    btn.style.background = "#FFF";
                    letterDiv.innerText = letter;
                    questionsLeft--;
                    if (questionsLeft > 0) nextQuestion(); else showResult();
                }, 400);
            };

            btn.innerHTML = `
                <div class="img-container">
                    <img src="${config.img}" class="animal-img" onerror="this.style.display='none'; this.parentElement.innerText='${config.emoji}';">
                </div>
            `;
            btn.appendChild(letterDiv);
            area.appendChild(btn);
        });
    }

    function showResult() {
        endTime = new Date();
        const duration = Math.floor((endTime - startTime) / 1000);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('result-text').innerText = `獲得分數：${score} / 10`;
        document.getElementById('time-text').innerText = `耗時：${duration} 秒`;
    }

    function saveRecord() {
        const duration = Math.floor((endTime - startTime) / 1000);
        const nameInput = document.getElementById('playerNameInput').value.trim();
        const finalName = nameInput || "匿名";
        const record = { name: finalName, lv: curLv, score, time: duration, date: new Date().toLocaleDateString() };
        let history = JSON.parse(localStorage.getItem('cmsNoteRankBassCoord') || "[]");
        history.push(record);
        localStorage.setItem('cmsNoteRankBassCoord', JSON.stringify(history));
    }

    function submitAndRestart() { saveRecord(); startGame(curLv); }
    function submitAndGoHome() { saveRecord(); goHome(); }

    function showRank() {
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'flex';
        let data = JSON.parse(localStorage.getItem('cmsNoteRankBassCoord') || "[]");
        data.sort((a, b) => (b.score - a.score) || (a.time - b.time));
        const body = document.getElementById('rank-body');
        body.innerHTML = data.slice(0, 15).map((d, i) => `
            <tr><td>${i+1}</td><td>${d.name}</td><td>${d.lv}</td><td>${d.score}</td><td>${d.time}s</td><td>${d.date}</td></tr>
        `).join('') || '<tr><td colspan="6">尚未有紀錄</td></tr>';
    }

    function goHome() {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'none';
        drawScene();
    }

    window.onload = () => drawScene();
</script>
</body>
</html>
